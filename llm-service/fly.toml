# fly.io config for the Mino llm-service. Private only: a service with no public
# ports, reached over flycast (a private IPv6) at mino-llm.flycast:8001. fly-proxy
# forwards to the app on 0.0.0.0:8001, so no IPv6 binding is needed in the image.
# At deploy time: fly ips allocate-v6 --private --app mino-llm
app = "mino-llm"
primary_region = "jnb"

[build]
  dockerfile = "Dockerfile"

[[services]]
  internal_port = 8001
  protocol = "tcp"
  # Stay warm: an on-call diagnosis engine must answer instantly, and diagnoses
  # are infrequent, so autostop would leave it cold.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  # Expose port 8001 over the (private) flycast IP. Without this, fly-proxy has no
  # port handler — flycast accepts the connection then resets it (httpx ReadError),
  # so the backend's call to mino-llm.flycast:8001 never reaches the app and the
  # diagnosis silently fails. Raw TCP passthrough; the app speaks HTTP on 8001. #66
  [[services.ports]]
    port = 8001

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
