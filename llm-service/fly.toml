# fly.io config for the Komodo llm-service. Private only: a service with no public
# ports, reached over flycast (a private IPv6) at komodo-llm.flycast:8001. fly-proxy
# forwards to the app on 0.0.0.0:8001, so no IPv6 binding is needed in the image.
# At deploy time: fly ips allocate-v6 --private --app komodo-llm
app = "komodo-llm"
primary_region = "jnb"

[build]
  dockerfile = "Dockerfile"

[[services]]
  internal_port = 8001
  protocol = "tcp"
  # Keep the service warm. Diagnoses are infrequent, so with autostop the machine
  # goes cold and the next diagnosis call hits a stopped/cold-starting machine —
  # fly-proxy resets the connection (httpx ReadError) and the card hangs on
  # "pending". An on-call diagnosis engine must answer instantly. See #66.
  auto_stop_machines = "off"
  auto_start_machines = false
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
